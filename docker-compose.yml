version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: telemetry_db
    environment:
      POSTGRES_DB: telemetry_db
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: